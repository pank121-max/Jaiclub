<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jai Club Official</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background:#000;
color:#fff;
text-align:center;
}

.container{
padding:20px;
max-width:400px;
margin:auto;
}

/* Top Active Bar */
.active-bar{
color:#facc15;
font-size:14px;
margin-bottom:20px;
}

/* Logo Circle */
.logo{
width:150px;
height:150px;
border-radius:50%;
border:3px solid gold;
margin:20px auto;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
background:#111;
box-shadow:0 0 30px rgba(255,215,0,0.5);
}

/* Headings */
.title{
font-size:26px;
font-weight:bold;
margin:10px 0;
}

.highlight{
color:#f97316;
}

/* Progress Bar */
.progress{
height:10px;
background:#222;
border-radius:10px;
margin:20px 0;
overflow:hidden;
}

.progress span{
display:block;
height:100%;
width:80%;
background:linear-gradient(to right,#f97316,#fb923c);
}

/* Button */
.btn{
display:block;
padding:18px;
margin:25px 0;
border-radius:50px;
font-size:18px;
font-weight:bold;
text-decoration:none;
color:#fff;
background:linear-gradient(45deg,#ff6a00,#ff2e00);
box-shadow:0 0 20px rgba(255,100,0,0.8);
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 30px rgba(255,100,0,1);
}

/* Countdown */
.timer{
display:flex;
justify-content:space-between;
margin-top:20px;
background:#111;
padding:15px;
border-radius:15px;
}

.timer div{
flex:1;
}

.timer span{
font-size:22px;
font-weight:bold;
color:#facc15;
}

/* Footer */
.footer{
margin-top:20px;
font-size:12px;
color:#888;
}
</style>
</head>

<body>

<div class="container">

<div class="active-bar">🟢 954 MEMBERS ACTIVE</div>

<div class="logo">JAI CLUB</div>

<div class="title">RECOVER ALL LOSSES</div>
<div class="title highlight">95% ACCURATE SIGNALS 🔥</div>

<div class="progress"><span></span></div>

<!-- SINGLE BUTTON -->
<a href="https://t.me/+rxgZtJqzOB8wMjQ1" class="btn" target="_blank">
🚀 JOIN JAI CLUB NOW
</a>

<!-- TIMER -->
<div class="timer">
<div><span>00</span><br>Days</div>
<div><span>09</span><br>Hrs</div>
<div><span>35</span><br>Min</div>
<div><span>03</span><br>Sec</div>
</div>

<div class="footer">
© 2026 Jai Club
</div>

</div>

</body>
</html>
