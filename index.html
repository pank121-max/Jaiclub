<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jai Club Official</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
color:#fff;
text-align:center;
overflow-x:hidden;
background:linear-gradient(-45deg,#000,#1a0000,#000,#331100);
background-size:400% 400%;
animation:bgMove 8s infinite linear;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
padding:20px;
max-width:400px;
margin:auto;
}

.active-bar{
color:#facc15;
font-size:14px;
margin-bottom:10px;
}

.earnings{
color:#22c55e;
font-size:16px;
margin-bottom:10px;
font-weight:bold;
}

.spots{
color:#ff4444;
font-size:14px;
margin-bottom:15px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0.5;}
}

.logo{
width:150px;height:150px;border-radius:50%;
border:3px solid gold;margin:20px auto;
display:flex;align-items:center;justify-content:center;
font-size:22px;font-weight:bold;background:#111;
box-shadow:0 0 30px rgba(255,215,0,0.5);
}

.title{font-size:26px;font-weight:bold;margin:10px 0;}
.highlight{color:#f97316;}

.progress{
height:10px;background:#222;border-radius:10px;
margin:20px 0;overflow:hidden;
}
.progress span{
display:block;height:100%;width:80%;
background:linear-gradient(to right,#f97316,#fb923c);
}

/* BUTTON */
.btn{
display:block;padding:18px;margin:25px 0;
border-radius:50px;font-size:18px;font-weight:bold;
text-decoration:none;color:#fff;
background:linear-gradient(45deg,#ff6a00,#ff2e00);
animation:pulse 1.5s infinite;
}
@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* TIMER */
.timer{
margin-top:20px;background:#111;
padding:15px;border-radius:15px;
}
.timer span{font-size:28px;color:#facc15;}

/* CHAT */
.chat-container{
position:fixed;
bottom:20px;
left:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:999;
}

.chat{
background:#111;
padding:10px 14px;
border-radius:12px;
font-size:13px;
opacity:0;
transform:translateY(20px);
animation:fadeIn 0.5s forwards;
}

@keyframes fadeIn{
to{opacity:1;transform:translateY(0);}
}

.footer{
margin-top:20px;
font-size:12px;
color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<div class="active-bar">🟢 <span id="members">954</span> MEMBERS ACTIVE</div>

<div class="earnings">💰 Today’s Profit: ₹<span id="earn">1250</span></div>

<div class="spots">⚠️ Only <span id="spots">5</span> spots left!</div>

<div class="logo">JAI CLUB</div>

<div class="title">RECOVER ALL LOSSES</div>
<div class="title highlight">95% ACCURATE SIGNALS 🔥</div>

<div class="progress"><span></span></div>

<a href="https://t.me/+4vEFvIZtOUBjODRl" class="btn">
🚀 JOIN JAI CLUB NOW
</a>

<div class="timer">
<span id="sec">60</span> Sec
</div>

<div class="footer">© 2026 Jai Club</div>

</div>

<div class="chat-container" id="chatContainer"></div>

<audio id="ping" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
// TIMER + REDIRECT
let time = 60;
const timer = setInterval(()=>{
if(time>0){
time--;
document.getElementById("sec").innerText=time;
}else{
clearInterval(timer);
window.location.href="https://t.me/+GAswegA9IisxMTY1";
}
},1000);

// MEMBERS
let members = 954;
setInterval(()=>{
members += Math.floor(Math.random()*2)+1;
document.getElementById("members").innerText = members;
}, 4000);

// EARNINGS COUNTER
let earn = 1250;
setInterval(()=>{
earn += Math.floor(Math.random()*200)+50;
document.getElementById("earn").innerText = earn;
}, 3000);

// SPOTS LEFT (urgency)
let spots = 5;
setInterval(()=>{
if(spots > 1){
spots--;
document.getElementById("spots").innerText = spots;
}
}, 10000);

// CHAT SYSTEM (SMART RANDOM)
const names = ["Rahul","Aman","Rohit","Vikas","Suresh","Neha","Pooja","Ankit","Raj","Karan"];
const msgs = [
"joined",
"earned ₹500",
"earned ₹1200",
"profit ₹850",
"withdraw ₹2000",
"just joined 🔥"
];const chatBox = document.getElementById("chatContainer");
const sound = document.getElementById("ping");

function addChat(){
const div = document.createElement("div");
div.className = "chat";

let name = names[Math.floor(Math.random()*names.length)];
let msg = msgs[Math.floor(Math.random()*msgs.length)];

div.innerText = name + " " + msg;

sound.currentTime = 0;
sound.play();

chatBox.appendChild(div);

setTimeout(()=>{div.remove();},6000);
}

// RANDOM INTERVAL (AI FEEL)
function randomChat(){
addChat();
setTimeout(randomChat, Math.random()*3000 + 2000);
}
randomChat();

</script>

</body>
</html>
